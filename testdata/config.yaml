exec:
  command: ["echo", "hello"]
  mode: scheduled
  interval: 10s

exec/streaming:
  command: ["tail", "-f", "/dev/null"]
  mode: streaming
  restart_delay: 2s
  include_stderr: false
  max_buffer_size: 2097152
  environment:
    FOO: bar
  working_directory: /tmp
  inherit_environment: false

exec/full:
  command: ["sh", "-c", "echo test"]
  mode: scheduled
  interval: 30s
  exec_timeout: 10s
  include_stderr: true
  max_buffer_size: 524288
  max_output_size: 5242880
  environment:
    ENV1: value1
    ENV2: value2
  working_directory: /tmp
  inherit_environment: true
  restart_delay: 5s
