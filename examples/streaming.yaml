receivers:
  exec:
    command: ["tail", "-f", "/var/log/syslog"]
    mode: streaming
    include_stderr: false
    restart_delay: 5s

processors:
  batch:
    timeout: 1s

exporters:
  otlp:
    endpoint: otel-collector:4317
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [exec]
      processors: [batch]
      exporters: [otlp]
